<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilt Studio</title>
    <link rel="stylesheet" href="styles/commun.css">
    <link rel="stylesheet" href="styles/jeu.css">
</head>
<body>

    <div class="menu">

        <h1>The Block Game</h1>

        <div class="btn">

            <a href="main.html" class="a1">Acceuil</a>
            <a href="media.html" class="a1">Médias</a>
            <a href="jeu.html" class="a1">Jeu en ligne !</a>

        </div>

    </div>

    <div class="jeu">

        <iframe src="the _block_game (0.45 html version)/index.html" frameborder="0"></iframe>

    </div>

    <button class="grand">Grand écran</button>

</body>
<script>
    // Par chatgpt mdr
    const btn = document.querySelector('.grand');
    const iframe = document.querySelector('.jeu iframe');

    btn.addEventListener('click', () => {
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) {
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
            iframe.msRequestFullscreen();
        } else {
            alert("Plein écran non supporté par votre navigateur");
        }
    });
</script>
</html>
